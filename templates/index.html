<!DOCTYPE html>
<html lang="en">

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.main-container {
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.card {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

h2 {
    color: #333;
    margin-bottom: 10px;
}

p {
    color: #666;
    font-size: 0.9rem;
    margin-bottom: 30px;
}

.input-group {
    text-align: left;
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: #555;
    margin-bottom: 5px;
}

input[type="number"] {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #eee;
    border-radius: 10px;
    outline: none;
    transition: 0.3s;
}

input[type="number"]:focus {
    border-color: #764ba2;
}

.predict-btn {
    width: 100%;
    padding: 15px;
    background: #764ba2;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, background 0.3s;
}

.predict-btn:hover {
    background: #5a3782;
    transform: translateY(-2px);
}

.result {
    margin-top: 30px;
    padding: 15px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    color: #166534;
}

.result h3 {
    font-size: 1rem;
    margin-bottom: 5px;
}
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Purchase Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="card">
            <h2>🚗 Car Purchase Prediction</h2>
            <p>Enter details to estimate buying probability</p>
            
            <form action="/predict" method="post">
                <div class="input-group">
                    <label for="age">User Age</label>
                    <input type="number" id="age" name="age" placeholder="e.g. 25" required>
                </div>

                <div class="input-group">
                    <label for="salary">Annual Salary ($)</label>
                    <input type="number" id="salary" name="salary" placeholder="e.g. 50000" required>
                </div>

                <button type="submit" class="predict-btn">Predict Now</button>
            </form>

            {% if prediction_text %}
            <div class="result">
                <h3>Result:</h3>
                <p>{{ prediction_text }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
